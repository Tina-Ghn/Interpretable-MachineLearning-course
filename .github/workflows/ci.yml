name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        assignment:
          - assignment_1
          - assignment_2
          - assignment_3
          - assignment_5
          - assignment_6
          - assignment_7
          - assignment_8

    env:
      MPLBACKEND: Agg
      PYTHONHASHSEED: "0"
      OMP_NUM_THREADS: "2"
      MKL_NUM_THREADS: "2"
      TORCH_HOME: ${{ github.workspace }}/.torch-cache

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
          cache-dependency-path: |
            ${{ matrix.assignment }}/requirements.txt
            constraints-ci.txt

      - name: Cache Torch / torchvision pretrained weights
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/torch
            .torch-cache
          key: torch-weights-${{ runner.os }}-${{ hashFiles('constraints-ci.txt') }}
          restore-keys: |
            torch-weights-${{ runner.os }}-

      - name: Install dependencies
        run: |
          set -eux
          python -m pip install --upgrade pip wheel setuptools
          pip install -r "${{ matrix.assignment }}/requirements.txt" \
            -c "${{ github.workspace }}/constraints-ci.txt" \
            --extra-index-url https://download.pytorch.org/whl/cpu
          pip freeze

      - name: Run tests
        working-directory: ${{ matrix.assignment }}
        run: pytest -q --tb=short
